<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>管理后台</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 2rem auto; }
    section { margin-bottom: 2rem; padding: 1rem; border: 1px solid #ccc; border-radius: 8px; }
    input, select, button { padding: 0.3rem; margin: 0.2rem 0; }
  </style>
</head>
<body>
  <h1>管理后台</h1>
  <button id="logout">退出登录</button>

  <section>
    <h2>更换背景图</h2>
    <input id="bg-url" placeholder="输入图片URL或上传" size="40">
    <button id="save-bg">保存背景</button>
    <br><small>或上传图片：</small>
    <input type="file" id="bg-file" accept="image/*">
  </section>

  <section>
    <h2>添加分类</h2>
    <input id="cat-name" placeholder="分类名称"> 
    <input id="cat-slug" placeholder="英文标识">
    <button id="add-cat">添加</button>
  </section>

  <section>
    <h2>添加图片</h2>
    <input id="img-url" placeholder="图片URL" size="40">
    <input id="img-title" placeholder="标题">
    <select id="img-cat"></select>
    <button id="add-img">添加</button>
  </section>

  <script>
    const SB_URL = 'https://ughyvyfwzrisbnpowumx.supabase.co/rest/v1/';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnaHl2eWZ3enJpc2JucG93dW14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzEzMTksImV4cCI6MjA5NjcwNzMxOX0.xtiiXgEEh2sfrFVG6dNWjHBwpHBRMXGK_hszHVxcFYo';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    // 验证是否登录
    async function checkAuth() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    // 等1秒再试一次
    setTimeout(async () => {
      const { data: { user: retryUser } } = await sb.auth.getUser();
      if (!retryUser) window.location.href = '/login.html';
      else location.reload();
    }, 1000);
  }
}
checkAuth();

    document.getElementById('logout').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = '/index.html';
    });

    // 更换背景
    async function setBg(url) {
      await sb.from('settings').update({ value: url }).eq('key', 'background_image');
      alert('背景已更新');
    }
    document.getElementById('save-bg').addEventListener('click', () => {
      setBg(document.getElementById('bg-url').value);
    });
    document.getElementById('bg-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const { data, error } = await sb.storage.from('backgrounds').upload(`bg-${Date.now()}.jpg`, file);
      if (error) return alert('上传失败');
      const url = sb.storage.from('backgrounds').getPublicUrl(data.path).data.publicUrl;
      setBg(url);
    });

    // 加载分类到下拉
    async function loadCats() {
      const { data } = await sb.from('categories').select('*');
      const sel = document.getElementById('img-cat');
      sel.innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }
    document.getElementById('add-cat').addEventListener('click', async () => {
      const name = document.getElementById('cat-name').value;
      const slug = document.getElementById('cat-slug').value;
      await sb.from('categories').insert({ name, slug });
      alert('分类已添加');
      loadCats();
    });

    document.getElementById('add-img').addEventListener('click', async () => {
      const url = document.getElementById('img-url').value;
      const title = document.getElementById('img-title').value;
      const category_id = document.getElementById('img-cat').value;
      await sb.from('images').insert({ url, title, category_id });
      alert('图片已添加');
    });

    loadCats();
  </script>
</body>
