<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>管理员登录</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui; display: flex; justify-content: center; align-items: center; height: 100vh; }
    form { display: flex; flex-direction: column; gap: 0.5rem; width: 300px; }
    input, button { padding: 0.5rem; }
  </style>
</head>
<body>
  <form id="login-form">
    <h2>管理员登录</h2>
    <input id="email" type="email" placeholder="邮箱" required>
    <input id="password" type="password" placeholder="密码" required>
    <button type="submit">登录</button>
  </form>
  <script>
    const sb = supabase.createClient('你的SUPABASE_URL', '你的ANON_KEY');
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const { data, error } = await sb.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      if (error) alert('登录失败：' + error.message);
      else window.location.href = '/admin.html';
    });
  </script>
</body>
</html>
