<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>管理员登录</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui; display: flex; justify-content: center; align-items: center; height: 100vh; }
    form { display: flex; flex-direction: column; gap: 0.5rem; width: 300px; }
    input, button { padding: 0.5rem; }
  </style>
</head>
<body>
  <form id="login-form">
    <h2>管理员登录</h2>
    <input id="email" type="email" placeholder="邮箱" required autocomplete="email">
    <input id="password" type="password" placeholder="密码" required autocomplete="current-password">
    <button type="submit">登录</button>
  </form>
  <script>
    const SB_URL = 'https://ughvyfwzrisbnpowumx.supabase.co'; // 同上
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnaHl2eWZ3enJpc2JucG93dW14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzEzMTksImV4cCI6MjA5NjcwNzMxOX0.xtiiXgEEh2sfrFVG6dNWjHBwpHBRMXGK_hszHVxcFYo'; // 同上
    const sb = supabase.createClient(SB_URL, SB_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        alert('登录失败：' + error.message);
      } else {
        window.location.href = '/admin.html';
      }
    });
  </script>
</body>
</html>
