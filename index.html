<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的画廊</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body id="body">
  <header>
    <h1>📸 我的作品集</h1>
    <div id="auth-box">
      <span id="user-status"></span>
      <button id="login-btn" onclick="location.href='login.html'">后台登录</button>
      <button id="logout-btn" style="display:none;">退出</button>
    </div>
    <div id="category-filters"></div>
  </header>

  <main id="gallery-grid" class="grid"></main>

  <div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="">
  </div>

  <script>
    const SB_URL = 'https://ughyvyfwzrisbnpowumx.supabase.co/rest/v1/';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnaHl2eWZ3enJpc2JucG93dW14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzEzMTksImV4cCI6MjA5NjcwNzMxOX0.xtiiXgEEh2sfrFVG6dNWjHBwpHBRMXGK_hszHVxcFYo';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    // 登录状态
    async function checkUser() {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        document.getElementById('user-status').innerText = '管理员在线';
        document.getElementById('logout-btn').style.display = 'inline-block';
        document.getElementById('login-btn').style.display = 'none';
      } else {
        document.getElementById('login-btn').style.display = 'inline-block';
        document.getElementById('logout-btn').style.display = 'none';
      }
    }
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      location.reload();
    });

    // 背景图
    async function loadBg() {
      const { data } = await sb.from('settings').select('value').eq('key','background_image').single();
      if (data) document.body.style.backgroundImage = `url(${data.value})`;
    }

    // 分类筛选
    async function loadCategories() {
      const { data } = await sb.from('categories').select('*');
      const ct = document.getElementById('category-filters');
      ct.innerHTML = '<button class="active" data-cat="all">全部</button>';
      data.forEach(cat => {
        const btn = document.createElement('button');
        btn.textContent = cat.name;
        btn.dataset.cat = cat.id;
        btn.addEventListener('click', filterImages);
        ct.appendChild(btn);
      });
    }

    // 图片加载
    async function loadImages(catId = null) {
      let q = sb.from('images').select('*');
      if (catId) q = q.eq('category_id', catId);
      const { data } = await q;
      renderGallery(data || []);
    }

    function renderGallery(images) {
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = images.map(img => `
        <div class="card" onclick="openLightbox('${img.url}')">
          <img src="${img.url}" alt="${img.title || ''}" loading="lazy">
        </div>`).join('');
    }

    function filterImages(e) {
      document.querySelectorAll('#category-filters button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      const catId = e.target.dataset.cat === 'all' ? null : e.target.dataset.cat;
      loadImages(catId);
    }

    function openLightbox(url) {
      document.getElementById('lightbox-img').src = url;
      document.getElementById('lightbox').style.display = 'flex';
    }

    // 初始化
    checkUser();
    loadBg();
    loadCategories();
    loadImages();
  </script>
</body>
</html>
