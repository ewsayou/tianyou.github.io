<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的画廊</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>我的作品集</h1>
      <div class="header-right">
        <span id="user-status"></span>
        <button id="login-btn" class="btn btn-primary btn-small" onclick="location.href='login.html'">后台登录</button>
        <button id="logout-btn" class="btn btn-ghost btn-small" style="display:none;">退出</button>
      </div>
      <div id="category-filters"></div>
    </div>
  </header>

  <main id="gallery-grid" class="grid">
    <div class="grid-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>加载中...</p>
    </div>
  </main>

  <div id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox(event)">✕</button>
    <img id="lightbox-img" src="">
    <span class="lightbox-caption" id="lightbox-caption"></span>
  </div>

  <script>
    const SB_URL = 'https://ughyvyfwzrisbnpowumx.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnaHl2eWZ3enJpc2JucG93dW14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzEzMTksImV4cCI6MjA5NjcwNzMxOX0.xtiiXgEEh2sfrFVG6dNWjHBwpHBRMXGK_hszHVxcFYo';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    async function checkUser() {
      const { data: { user } } = await sb.auth.getUser();
      const statusEl = document.getElementById('user-status');
      if (user) {
        statusEl.innerText = '管理员在线';
        document.getElementById('logout-btn').style.display = 'inline-flex';
        document.getElementById('login-btn').style.display = 'none';
      } else {
        document.getElementById('login-btn').style.display = 'inline-flex';
        document.getElementById('logout-btn').style.display = 'none';
      }
    }
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      location.reload();
    });

    async function loadBg() {
      const { data } = await sb.from('settings').select('value').eq('key','background_image').single();
      if (data) document.body.style.backgroundImage = `url(${data.value})`;
    }

    async function loadCategories() {
      const { data } = await sb.from('categories').select('*');
      const ct = document.getElementById('category-filters');
      ct.innerHTML = '<button class="active" data-cat="all">全部</button>';
      data.forEach(cat => {
        const btn = document.createElement('button');
        btn.textContent = cat.name;
        btn.dataset.cat = cat.id;
        btn.addEventListener('click', filterImages);
        ct.appendChild(btn);
      });
    }

    async function loadImages(catId = null) {
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = '<div class="grid-empty"><div class="spinner"></div><p style="margin-top:0.5rem">加载中...</p></div>';
      let q = sb.from('images').select('*');
      if (catId) q = q.eq('category_id', catId);
      const { data } = await q;
      if (!data || data.length === 0) {
        grid.innerHTML = `
          <div class="grid-empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <p>暂无图片</p>
          </div>`;
        return;
      }
      renderGallery(data);
    }

    function renderGallery(images) {
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = images.map(img => `
        <div class="card" onclick="openLightbox('${img.url.replace(/'/g, "\\'")}', '${(img.title || '').replace(/'/g, "\\'")}')">
          <img src="${img.url}" alt="${img.title || ''}" loading="lazy">
          ${img.title ? `<div class="card-overlay"><span class="card-title">${img.title}</span></div>` : ''}
        </div>`).join('');
    }

    function filterImages(e) {
      document.querySelectorAll('#category-filters button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      const catId = e.target.dataset.cat === 'all' ? null : e.target.dataset.cat;
      loadImages(catId);
    }

    function openLightbox(url, title) {
      document.getElementById('lightbox-img').src = url;
      document.getElementById('lightbox-caption').textContent = title || '';
      document.getElementById('lightbox').classList.add('show');
    }

    function closeLightbox(e) {
      if (e.target === document.getElementById('lightbox') || e.target.classList.contains('lightbox-close')) {
        document.getElementById('lightbox').classList.remove('show');
      }
    }

    checkUser();
    loadBg();
    loadCategories();
    loadImages();
  </script>
</body>
</html>
